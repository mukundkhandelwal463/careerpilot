# Prometheus config for LOCAL development (no Docker)
# Use this when running Flask directly with: python app.py

global:
  scrape_interval:      15s
  scrape_timeout:       10s
  evaluation_interval:  15s

scrape_configs:

  # Flask Backend (running locally on port 5000)
  - job_name: 'resume-screener-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:5000']      # Changed from backend:5000 (Docker) to localhost
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'resume-backend'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
