name: CareerPilot CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Test & Build (Django + Vite React)
  # ════════════════════════════════════════════════════════════
  build-and-test:
    name: ⚡ Test & Build Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: ⚙️ Django System & Migration Check
        run: |
          python backend/manage.py check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SECRET_KEY: ci-cd-secret-key-2026

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: |
          cd client
          npm ci

      - name: 🏗️ Build Vite Production Bundle
        run: |
          cd client
          npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

  # ════════════════════════════════════════════════════════════
  # JOB 2: AWS Deployment (Runs on Push to Main)
  # ════════════════════════════════════════════════════════════
  deploy-aws:
    name: 🚀 Deploy to AWS Free Tier
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/

      - name: 🔑 SSH Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ secrets.EC2_HOST != '' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/careerpilot
            git pull origin main
            source .venv/bin/activate
            pip install -r backend/requirements.txt
            python backend/manage.py migrate
            sudo systemctl restart careerpilot
            sudo systemctl restart nginx
            echo "✅ Deployment completed successfully!"
