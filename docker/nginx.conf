server {
    listen 80;
    server_name _;

    # Set the root directory for all frontend files
    root /usr/share/nginx/html;

    # ── Serve React SPA (Resume Maker) ──────────────────────────
    location / {
        # SPA fallback: let React Router handle client-side routing
        try_files $uri $uri/ /index.html;
        
        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Proxy all /api/ requests to Flask backend ────────────────
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Increase timeout for AI calls (Gemini can take up to 30s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        
        # Allow large resume file uploads (up to 20MB)
        client_max_body_size 20M;
    }

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
